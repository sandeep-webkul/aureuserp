; =============================================================================
; AureusERP — production PHP configuration
; Loaded for both the FPM and CLI SAPIs as conf.d/99-aureus.ini
; =============================================================================

; --- Resource limits ---------------------------------------------------------
memory_limit = 512M
upload_max_filesize = 100M
post_max_size = 110M
max_execution_time = 300
max_input_time = 300

; Filament Shield's permission matrix and large ERP forms post far more than
; PHP's default 1000 input variables; raising this avoids silently dropped fields.
max_input_vars = 10000

; --- Error handling ----------------------------------------------------------
display_errors = Off
display_startup_errors = Off
log_errors = On
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT
error_log = /var/log/aureus/php-error.log

; --- General -----------------------------------------------------------------
date.timezone = "UTC"
expose_php = Off

; --- OPcache -----------------------------------------------------------------
; validate_timestamps=0 means changed code is NOT picked up at runtime — the
; image is immutable, so code changes require rebuilding the image.
opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 256
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 20000
opcache.validate_timestamps = 0
opcache.save_comments = 1

; --- Realpath cache ----------------------------------------------------------
realpath_cache_size = 4096K
realpath_cache_ttl = 600
