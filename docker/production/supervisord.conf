; =============================================================================
; AureusERP — Supervisor process configuration
; Programs: mysql (conditional) · php-fpm · nginx · queue worker · scheduler
; =============================================================================

[supervisord]
nodaemon=true
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid
user=root

; -----------------------------------------------------------------------------
; MySQL — internal database. Disabled at runtime when an external DB is used
; (the entrypoint exports MYSQL_AUTOSTART=false in that case).
; -----------------------------------------------------------------------------
[program:mysql]
command=/usr/sbin/mysqld --user=mysql --datadir=/var/lib/mysql
autostart=%(ENV_MYSQL_AUTOSTART)s
autorestart=true
priority=1
startsecs=5
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

; -----------------------------------------------------------------------------
; PHP-FPM
; -----------------------------------------------------------------------------
[program:php-fpm]
command=/usr/sbin/php-fpm8.4 -F --fpm-config /etc/php/8.4/fpm/php-fpm.conf
autostart=true
autorestart=true
priority=5
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

; -----------------------------------------------------------------------------
; Nginx
; -----------------------------------------------------------------------------
[program:nginx]
command=/usr/sbin/nginx -g "daemon off;"
autostart=true
autorestart=true
priority=10
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

; -----------------------------------------------------------------------------
; Queue worker. startretries/startsecs are generous so the worker survives the
; short window before MySQL accepts connections on a cold start.
; -----------------------------------------------------------------------------
[program:queue]
command=/usr/bin/php /var/www/aureuserp/artisan queue:work --tries=3 --sleep=3 --max-time=3600
directory=/var/www/aureuserp
user=www-data
autostart=true
autorestart=true
priority=20
startsecs=10
startretries=10
stopwaitsecs=60
stopsignal=TERM
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

; -----------------------------------------------------------------------------
; Scheduler — runs due scheduled tasks every minute.
; -----------------------------------------------------------------------------
[program:scheduler]
command=/usr/bin/php /var/www/aureuserp/artisan schedule:work
directory=/var/www/aureuserp
user=www-data
autostart=true
autorestart=true
priority=30
startretries=10
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
